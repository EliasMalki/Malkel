<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380" role="img" aria-label="An iPhone with a Dynamic Island showing a workforce management app with a live GPS map, crew status list, and clock-in button.">
  <style>
    .bg-card{fill:#0a0a0a}
    .phone-body{fill:#1c1c1e}
    .phone-frame{fill:#2a2a2c}
    .phone-screen{fill:#000}
    .text-strong{fill:#fff}
    .text-mid{fill:rgba(255,255,255,0.32)}
    .text-soft{fill:rgba(255,255,255,0.18)}
    .row-bg{fill:rgba(255,255,255,0.04)}
    .map-bg{fill:#0a0a0a;stroke:rgba(255,255,255,0.06)}
    .map-grid{stroke:rgba(255,255,255,0.04)}
    .border-faint{stroke:rgba(255,255,255,0.06)}
    .ghost-card-bg{fill:#0d0d0d;stroke:rgba(255,255,255,0.06)}
    .ghost-row{fill:rgba(255,255,255,0.03)}
    .btn-primary{fill:#fff}
    .btn-primary-text{fill:#0a0a0a}

    .light .bg-card{fill:#F5F5F7}
    .light .phone-body{fill:#1c1c1e}
    .light .phone-frame{fill:#3a3a3c}
    .light .phone-screen{fill:#fff}
    .light .text-strong{fill:#0a0a0a}
    .light .text-mid{fill:rgba(0,0,0,0.45)}
    .light .text-soft{fill:rgba(0,0,0,0.20)}
    .light .row-bg{fill:#F5F5F7}
    .light .map-bg{fill:#F0F0F2;stroke:rgba(0,0,0,0.06)}
    .light .map-grid{stroke:rgba(0,0,0,0.05)}
    .light .border-faint{stroke:rgba(0,0,0,0.08)}
    .light .ghost-card-bg{fill:#FAFAFC;stroke:rgba(0,0,0,0.06)}
    .light .ghost-row{fill:#F0F0F2}
    .light .btn-primary{fill:#0a0a0a}
    .light .btn-primary-text{fill:#fff}
  </style>

  <defs>
    <radialGradient id="map-glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="380" class="bg-card"/>

  <!-- Decorative offset card behind phone -->
  <g transform="translate(110 60) rotate(-5 110 130)" opacity="0.5">
    <rect width="220" height="260" rx="18" class="ghost-card-bg" stroke-width="0.5"/>
    <rect x="16" y="16" width="80" height="6" rx="1" class="text-soft"/>
    <rect x="16" y="28" width="120" height="3" rx="1" class="text-soft" opacity="0.6"/>
    <rect x="16" y="50" width="188" height="40" rx="6" class="ghost-row"/>
    <rect x="16" y="100" width="188" height="40" rx="6" class="ghost-row"/>
    <rect x="16" y="150" width="188" height="40" rx="6" class="ghost-row"/>
    <rect x="16" y="208" width="188" height="32" rx="16" class="ghost-row"/>
  </g>

  <!-- Main iPhone -->
  <g transform="translate(220 30)">
    <!-- outer frame (titanium) -->
    <rect width="170" height="320" rx="32" class="phone-body"/>
    <rect x="2" y="2" width="166" height="316" rx="30" class="phone-frame"/>
    <!-- screen -->
    <rect x="6" y="6" width="158" height="308" rx="26" class="phone-screen"/>

    <!-- Dynamic Island -->
    <rect x="58" y="14" width="54" height="16" rx="8" fill="#000"/>
    <circle cx="68" cy="22" r="1.4" fill="#1a1a1a"/>
    <circle cx="104" cy="22" r="2.4" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="0.3"/>
    <circle cx="104" cy="22" r="1" fill="#0a0a0a"/>

    <!-- status bar -->
    <text x="22" y="42" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="7" font-weight="600" class="text-strong">9:41</text>
    <g transform="translate(126 36)">
      <!-- signal bars -->
      <rect x="0" y="3" width="1.6" height="3" rx="0.3" class="text-strong"/>
      <rect x="2.4" y="2" width="1.6" height="4" rx="0.3" class="text-strong"/>
      <rect x="4.8" y="1" width="1.6" height="5" rx="0.3" class="text-strong"/>
      <rect x="7.2" y="0" width="1.6" height="6" rx="0.3" class="text-strong"/>
      <!-- wifi -->
      <path d="M 13 4 Q 16 1 19 4" stroke="currentColor" class="text-strong" stroke-width="0.8" fill="none"/>
      <path d="M 14 5 Q 16 3 18 5" stroke="currentColor" class="text-strong" stroke-width="0.8" fill="none"/>
      <circle cx="16" cy="6" r="0.6" class="text-strong"/>
      <!-- battery -->
      <rect x="22" y="0" width="14" height="6" rx="1.5" fill="none" stroke="currentColor" class="text-strong" stroke-width="0.5" opacity="0.5"/>
      <rect x="36.5" y="2" width="0.8" height="2" rx="0.3" class="text-strong" opacity="0.5"/>
      <rect x="23" y="1" width="9" height="4" rx="0.5" fill="#28C840"/>
    </g>

    <!-- header -->
    <g transform="translate(16 50)">
      <rect x="0" y="0" width="58" height="3" rx="0.7" class="text-mid"/>
      <text x="0" y="14" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="700" class="text-strong">Crew Status</text>
      <!-- notification badge avatar -->
      <circle cx="130" cy="9" r="8" fill="#3B82F6"/>
      <text x="130" y="11.5" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="6" font-weight="700" fill="#fff">MR</text>
      <circle cx="135" cy="4" r="2.5" fill="#FF3B30"/>
      <text x="135" y="6" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="3.6" font-weight="700" fill="#fff">3</text>
    </g>

    <!-- Map area -->
    <g transform="translate(16 76)">
      <rect x="0" y="0" width="138" height="68" rx="8" class="map-bg" stroke-width="0.5"/>
      <line x1="0" y1="22" x2="138" y2="22" class="map-grid" stroke-width="0.4"/>
      <line x1="0" y1="44" x2="138" y2="44" class="map-grid" stroke-width="0.4"/>
      <line x1="46" y1="0" x2="46" y2="68" class="map-grid" stroke-width="0.4"/>
      <line x1="92" y1="0" x2="92" y2="68" class="map-grid" stroke-width="0.4"/>

      <!-- route -->
      <path d="M 22 54 Q 60 36 80 38 Q 105 40 116 18" stroke="#3B82F6" stroke-width="1.2" stroke-dasharray="2 2" fill="none" opacity="0.7"/>

      <!-- destination glow -->
      <circle cx="116" cy="18" r="16" fill="url(#map-glow-blue)"/>

      <!-- start pin -->
      <circle cx="22" cy="54" r="3.5" fill="#fff"/>
      <circle cx="22" cy="54" r="1.6" fill="#0a0a0a"/>

      <!-- end pin (live) -->
      <circle cx="116" cy="18" r="4" fill="#3B82F6"/>
      <circle cx="116" cy="18" r="1.8" fill="#fff"/>
      <circle cx="116" cy="18" r="4" fill="#3B82F6" opacity="0.5">
        <animate attributeName="r" from="4" to="11" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" from="0.5" to="0" dur="1.8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- crew list -->
    <g transform="translate(16 152)">
      <!-- row 1 -->
      <rect x="0" y="0" width="138" height="24" rx="5" class="row-bg"/>
      <circle cx="12" cy="12" r="6.5" fill="#10B981"/>
      <text x="12" y="14" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="5" font-weight="700" fill="#fff">JS</text>
      <rect x="24" y="7" width="52" height="3" rx="0.7" class="text-strong" opacity="0.85"/>
      <rect x="24" y="14" width="36" height="2.4" rx="0.5" class="text-mid"/>
      <rect x="100" y="8" width="32" height="9" rx="4.5" fill="rgba(16,185,129,0.18)"/>
      <circle cx="106" cy="12.5" r="1.5" fill="#10B981"/>
      <text x="119" y="14.6" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="4.5" font-weight="700" fill="#10B981">ON SITE</text>

      <!-- row 2 -->
      <rect x="0" y="28" width="138" height="24" rx="5" class="row-bg"/>
      <circle cx="12" cy="40" r="6.5" fill="#F59E0B"/>
      <text x="12" y="42" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="5" font-weight="700" fill="#fff">AT</text>
      <rect x="24" y="35" width="60" height="3" rx="0.7" class="text-strong" opacity="0.85"/>
      <rect x="24" y="42" width="40" height="2.4" rx="0.5" class="text-mid"/>
      <rect x="100" y="36" width="32" height="9" rx="4.5" fill="rgba(245,158,11,0.18)"/>
      <circle cx="106" cy="40.5" r="1.5" fill="#F59E0B"/>
      <text x="119" y="42.6" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="4.5" font-weight="700" fill="#F59E0B">EN ROUTE</text>

      <!-- row 3 -->
      <rect x="0" y="56" width="138" height="24" rx="5" class="row-bg"/>
      <circle cx="12" cy="68" r="6.5" fill="#6366F1"/>
      <text x="12" y="70" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="5" font-weight="700" fill="#fff">DR</text>
      <rect x="24" y="63" width="46" height="3" rx="0.7" class="text-strong" opacity="0.85"/>
      <rect x="24" y="70" width="38" height="2.4" rx="0.5" class="text-mid"/>
      <rect x="100" y="64" width="32" height="9" rx="4.5" fill="rgba(99,102,241,0.18)"/>
      <circle cx="106" cy="68.5" r="1.5" fill="#6366F1"/>
      <text x="119" y="70.6" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="4.5" font-weight="700" fill="#6366F1">BREAK</text>
    </g>

    <!-- Clock-in button -->
    <g transform="translate(16 246)">
      <rect width="138" height="34" rx="17" class="btn-primary"/>
      <!-- QR icon -->
      <rect x="22" y="13" width="8" height="8" rx="1" fill="none" class="btn-primary-text" stroke="currentColor" stroke-width="0.9"/>
      <rect x="24" y="15" width="2" height="2" class="btn-primary-text"/>
      <text x="80" y="20" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="8" font-weight="700" class="btn-primary-text">Clock-in via QR</text>
    </g>

    <!-- home indicator -->
    <rect x="60" y="298" width="50" height="3" rx="1.5" class="text-strong" opacity="0.4"/>
  </g>
</svg>
