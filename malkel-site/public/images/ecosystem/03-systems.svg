<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380" role="img" aria-label="An iPad in landscape orientation displaying an animated CRM dashboard with live counters, an animating sparkline, status pills, and a new row sliding into the data table.">
  <style>
    .bg-card{fill:#0a0a0a}
    .ipad-body{fill:#1c1c1e}
    .ipad-frame{fill:#2a2a2c}
    .ipad-screen{fill:#0a0a0a}
    .text-strong{fill:#fff}
    .text-mid{fill:rgba(255,255,255,0.5)}
    .text-soft{fill:rgba(255,255,255,0.32)}
    .text-faint{fill:rgba(255,255,255,0.18)}
    .surface{fill:rgba(255,255,255,0.03);stroke:rgba(255,255,255,0.06)}
    .row-bg{fill:rgba(255,255,255,0.025)}
    .border-faint{stroke:rgba(255,255,255,0.05)}
    .sidebar-bg{fill:rgba(255,255,255,0.02)}
    .active-item{fill:rgba(255,255,255,0.07)}

    .light .bg-card{fill:#F5F5F7}
    .light .ipad-body{fill:#1c1c1e}
    .light .ipad-frame{fill:#3a3a3c}
    .light .ipad-screen{fill:#F5F5F7}
    .light .text-strong{fill:#0a0a0a}
    .light .text-mid{fill:rgba(0,0,0,0.6)}
    .light .text-soft{fill:rgba(0,0,0,0.4)}
    .light .text-faint{fill:rgba(0,0,0,0.2)}
    .light .surface{fill:#fff;stroke:rgba(0,0,0,0.06)}
    .light .row-bg{fill:#FAFAFC}
    .light .border-faint{stroke:rgba(0,0,0,0.05)}
    .light .sidebar-bg{fill:#FAFAFC}
    .light .active-item{fill:rgba(0,0,0,0.06)}
  </style>

  <defs>
    <linearGradient id="chart-grad-s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="chart-clip">
      <rect x="0" y="0" width="86" height="36"/>
    </clipPath>
  </defs>

  <rect width="600" height="380" class="bg-card"/>

  <!-- iPad frame (landscape) -->
  <g transform="translate(40 50)">
    <!-- outer body -->
    <rect width="520" height="280" rx="20" class="ipad-body"/>
    <rect x="2" y="2" width="516" height="276" rx="18" class="ipad-frame"/>
    <!-- screen -->
    <rect x="10" y="10" width="500" height="260" rx="11" class="ipad-screen"/>

    <!-- camera -->
    <circle cx="20" cy="140" r="1.6" fill="#1a1a1a"/>

    <!-- Dashboard content -->
    <g transform="translate(10 10)" clip-path="inset(0 round 11px)">
      <!-- top bar -->
      <rect x="0" y="0" width="500" height="30" fill="rgba(255,255,255,0.02)"/>
      <line x1="0" y1="30" x2="500" y2="30" class="border-faint" stroke-width="0.5"/>

      <text x="14" y="20" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="9" font-weight="700" class="text-strong">Pipeline</text>
      <rect x="58" y="15" width="6" height="2" rx="0.5" class="text-soft"/>
      <text x="68" y="20" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="7" class="text-mid">All deals</text>

      <!-- search -->
      <rect x="280" y="9" width="118" height="14" rx="3" class="surface" stroke-width="0.5"/>
      <circle cx="288" cy="16" r="2.4" fill="none" class="text-mid" stroke="currentColor" stroke-width="0.7"/>
      <line x1="290" y1="18" x2="292" y2="20" class="text-mid" stroke="currentColor" stroke-width="0.7"/>
      <rect x="294" y="14.5" width="46" height="2.5" rx="0.7" class="text-faint"/>

      <!-- avatars cluster -->
      <circle cx="416" cy="16" r="6" fill="#6366F1"/>
      <circle cx="426" cy="16" r="6" fill="#10B981"/>
      <circle cx="436" cy="16" r="6" fill="#F59E0B"/>
      <circle cx="446" cy="16" r="6" class="surface" stroke-width="0.5"/>
      <text x="446" y="18.4" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="5" class="text-mid">+3</text>
      <rect x="464" y="9" width="14" height="14" rx="3" class="active-item"/>
      <line x1="468" y1="16" x2="474" y2="16" class="text-strong" stroke="currentColor" stroke-width="0.9" opacity="0.5"/>
      <line x1="471" y1="13" x2="471" y2="19" class="text-strong" stroke="currentColor" stroke-width="0.9" opacity="0.5"/>

      <!-- sidebar -->
      <rect x="0" y="30" width="76" height="230" class="sidebar-bg"/>
      <line x1="76" y1="30" x2="76" y2="260" class="border-faint" stroke-width="0.5"/>

      <g transform="translate(8 42)">
        <rect x="0" y="0" width="60" height="16" rx="3" class="active-item"/>
        <rect x="6" y="6" width="4" height="4" rx="0.7" class="text-strong"/>
        <rect x="14" y="6.5" width="34" height="3" rx="0.7" class="text-strong" opacity="0.85"/>

        <rect x="6" y="26" width="4" height="4" rx="0.7" class="text-soft"/>
        <rect x="14" y="26.5" width="40" height="3" rx="0.7" class="text-soft"/>

        <rect x="6" y="46" width="4" height="4" rx="0.7" class="text-soft"/>
        <rect x="14" y="46.5" width="32" height="3" rx="0.7" class="text-soft"/>

        <rect x="6" y="66" width="4" height="4" rx="0.7" class="text-soft"/>
        <rect x="14" y="66.5" width="36" height="3" rx="0.7" class="text-soft"/>

        <rect x="6" y="86" width="4" height="4" rx="0.7" class="text-soft"/>
        <rect x="14" y="86.5" width="28" height="3" rx="0.7" class="text-soft"/>

        <line x1="0" y1="106" x2="60" y2="106" class="border-faint" stroke-width="0.5"/>
        <rect x="14" y="116.5" width="22" height="2.5" rx="0.7" class="text-faint"/>

        <rect x="6" y="130" width="4" height="4" rx="0.7" class="text-soft"/>
        <rect x="14" y="130.5" width="38" height="3" rx="0.7" class="text-soft"/>

        <rect x="6" y="150" width="4" height="4" rx="0.7" class="text-soft"/>
        <rect x="14" y="150.5" width="30" height="3" rx="0.7" class="text-soft"/>
      </g>

      <!-- Main content -->
      <g transform="translate(86 42)">

        <!-- KPI 1: Revenue (animating counter) -->
        <rect x="0" y="0" width="98" height="46" rx="6" class="surface" stroke-width="0.5"/>
        <rect x="9" y="8" width="40" height="3" rx="0.7" class="text-mid"/>
        <text x="9" y="28" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="700" class="text-strong">
          $<tspan id="rev">2.4</tspan>M
          <animate attributeName="opacity" values="1;1" dur="3s" repeatCount="indefinite"/>
        </text>
        <text x="9" y="28" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="700" class="text-strong">
          <set attributeName="opacity" to="0"/>
        </text>
        <!-- animated number using value swaps -->
        <g>
          <text x="9" y="28" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="700" class="text-strong" opacity="0">
            $2.4M
            <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.45;0.5;1" dur="6s" repeatCount="indefinite"/>
          </text>
          <text x="9" y="28" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="700" class="text-strong" opacity="0">
            $2.6M
            <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.45;0.5;0.95;0.97;1" dur="6s" repeatCount="indefinite"/>
          </text>
        </g>
        <rect x="9" y="34" width="6" height="2.5" rx="0.5" fill="#10B981"/>
        <rect x="17" y="34.5" width="32" height="2" rx="0.5" class="text-soft"/>

        <!-- KPI 2: Leads -->
        <rect x="106" y="0" width="98" height="46" rx="6" class="surface" stroke-width="0.5"/>
        <rect x="115" y="8" width="36" height="3" rx="0.7" class="text-mid"/>
        <g>
          <text x="115" y="28" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="700" class="text-strong">
            187
            <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.3;0.32;0.6;0.62" dur="6s" repeatCount="indefinite"/>
          </text>
          <text x="115" y="28" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="700" class="text-strong" opacity="0">
            192
            <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3;0.32;0.6;0.62" dur="6s" repeatCount="indefinite"/>
          </text>
        </g>
        <rect x="115" y="34" width="6" height="2.5" rx="0.5" fill="#10B981"/>
        <rect x="123" y="34.5" width="28" height="2" rx="0.5" class="text-soft"/>

        <!-- KPI 3: Conv -->
        <rect x="212" y="0" width="98" height="46" rx="6" class="surface" stroke-width="0.5"/>
        <rect x="221" y="8" width="44" height="3" rx="0.7" class="text-mid"/>
        <text x="221" y="28" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="700" class="text-strong">42%</text>
        <rect x="221" y="34" width="6" height="2.5" rx="0.5" fill="#EF4444"/>
        <rect x="229" y="34.5" width="32" height="2" rx="0.5" class="text-soft"/>

        <!-- KPI 4: animated sparkline -->
        <rect x="318" y="0" width="92" height="46" rx="6" class="surface" stroke-width="0.5"/>
        <rect x="327" y="8" width="40" height="3" rx="0.7" class="text-mid"/>
        <g transform="translate(327 6)" clip-path="url(#chart-clip)">
          <!-- area -->
          <path d="M 0 32 L 10 26 L 20 28 L 30 20 L 40 22 L 50 16 L 60 12 L 70 14 L 80 8 L 86 10 L 86 36 L 0 36 Z" fill="url(#chart-grad-s)" opacity="0">
            <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.8s" fill="freeze"/>
          </path>
          <!-- line drawing -->
          <path d="M 0 32 L 10 26 L 20 28 L 30 20 L 40 22 L 50 16 L 60 12 L 70 14 L 80 8 L 86 10" fill="none" stroke="#10B981" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="200" stroke-dashoffset="200">
            <animate attributeName="stroke-dashoffset" from="200" to="0" dur="1.4s" begin="0.2s" fill="freeze"/>
            <animate attributeName="stroke-dashoffset" from="200" to="0" dur="1.4s" begin="6s" fill="freeze"/>
          </path>
          <!-- end dot -->
          <circle cx="86" cy="10" r="1.6" fill="#10B981" opacity="0">
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.6s" fill="freeze"/>
          </circle>
          <circle cx="86" cy="10" r="3" fill="#10B981" opacity="0">
            <animate attributeName="r" from="3" to="6" dur="1.4s" begin="1.6s" repeatCount="indefinite"/>
            <animate attributeName="opacity" from="0.6" to="0" dur="1.4s" begin="1.6s" repeatCount="indefinite"/>
          </circle>
        </g>

        <!-- table -->
        <g transform="translate(0 60)">
          <!-- header -->
          <rect x="0" y="0" width="410" height="22" rx="4" class="row-bg"/>
          <rect x="10" y="9" width="4" height="4" rx="0.6" class="text-faint"/>
          <rect x="22" y="9" width="42" height="3" rx="0.7" class="text-soft"/>
          <rect x="116" y="9" width="34" height="3" rx="0.7" class="text-soft"/>
          <rect x="194" y="9" width="32" height="3" rx="0.7" class="text-soft"/>
          <rect x="272" y="9" width="38" height="3" rx="0.7" class="text-soft"/>
          <rect x="356" y="9" width="40" height="3" rx="0.7" class="text-soft"/>

          <!-- new row sliding in (animation) -->
          <g transform="translate(0 26)" opacity="0">
            <animate attributeName="opacity" values="0;1;1;1;1;0" keyTimes="0;0.1;0.85;0.9;0.95;1" dur="6s" repeatCount="indefinite"/>
            <animateTransform attributeName="transform" type="translate" values="0,16;0,26;0,26" keyTimes="0;0.15;1" dur="6s" repeatCount="indefinite"/>
            <line x1="0" y1="0" x2="410" y2="0" class="border-faint" stroke-width="0.5"/>
            <rect x="10" y="9" width="4" height="4" rx="0.6" class="surface" stroke-width="0.4"/>
            <rect x="22" y="9" width="76" height="3" rx="0.7" class="text-strong" opacity="0.85"/>
            <rect x="116" y="9" width="58" height="3" rx="0.7" class="text-mid"/>
            <rect x="194" y="9" width="46" height="3" rx="0.7" class="text-mid"/>
            <rect x="272" y="6" width="48" height="11" rx="5.5" fill="rgba(16,185,129,0.18)"/>
            <circle cx="279" cy="11.5" r="1.6" fill="#10B981"/>
            <text x="297" y="13.4" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="4.5" font-weight="700" fill="#10B981">QUALIFIED</text>
            <rect x="356" y="9" width="40" height="3" rx="0.7" class="text-mid"/>
            <!-- new badge -->
            <rect x="386" y="6" width="20" height="11" rx="5.5" fill="rgba(99,102,241,0.22)"/>
            <text x="396" y="13.4" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="4.5" font-weight="700" fill="#6366F1">NEW</text>
          </g>

          <!-- existing rows -->
          <g transform="translate(0 50)">
            <line x1="0" y1="0" x2="410" y2="0" class="border-faint" stroke-width="0.5"/>
            <rect x="10" y="9" width="4" height="4" rx="0.6" class="surface" stroke-width="0.4"/>
            <rect x="22" y="9" width="80" height="3" rx="0.7" class="text-strong" opacity="0.85"/>
            <rect x="116" y="9" width="60" height="3" rx="0.7" class="text-mid"/>
            <rect x="194" y="9" width="46" height="3" rx="0.7" class="text-mid"/>
            <rect x="272" y="6" width="48" height="11" rx="5.5" fill="rgba(16,185,129,0.18)"/>
            <circle cx="279" cy="11.5" r="1.6" fill="#10B981"/>
            <text x="297" y="13.4" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="4.5" font-weight="700" fill="#10B981">QUALIFIED</text>
            <rect x="356" y="9" width="40" height="3" rx="0.7" class="text-mid"/>
          </g>

          <g transform="translate(0 74)">
            <line x1="0" y1="0" x2="410" y2="0" class="border-faint" stroke-width="0.5"/>
            <rect x="10" y="9" width="4" height="4" rx="0.6" class="surface" stroke-width="0.4"/>
            <rect x="22" y="9" width="74" height="3" rx="0.7" class="text-strong" opacity="0.85"/>
            <rect x="116" y="9" width="56" height="3" rx="0.7" class="text-mid"/>
            <rect x="194" y="9" width="42" height="3" rx="0.7" class="text-mid"/>
            <!-- pulsing pending pill -->
            <rect x="272" y="6" width="48" height="11" rx="5.5" fill="rgba(245,158,11,0.18)"/>
            <circle cx="279" cy="11.5" r="1.6" fill="#F59E0B">
              <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
            </circle>
            <text x="297" y="13.4" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="4.5" font-weight="700" fill="#F59E0B">PENDING</text>
            <rect x="356" y="9" width="36" height="3" rx="0.7" class="text-mid"/>
          </g>

          <g transform="translate(0 98)">
            <line x1="0" y1="0" x2="410" y2="0" class="border-faint" stroke-width="0.5"/>
            <rect x="10" y="9" width="4" height="4" rx="0.6" class="surface" stroke-width="0.4"/>
            <rect x="22" y="9" width="86" height="3" rx="0.7" class="text-strong" opacity="0.85"/>
            <rect x="116" y="9" width="50" height="3" rx="0.7" class="text-mid"/>
            <rect x="194" y="9" width="48" height="3" rx="0.7" class="text-mid"/>
            <rect x="272" y="6" width="48" height="11" rx="5.5" fill="rgba(99,102,241,0.18)"/>
            <circle cx="279" cy="11.5" r="1.6" fill="#6366F1"/>
            <text x="297" y="13.4" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="4.5" font-weight="700" fill="#6366F1">REVIEW</text>
            <rect x="356" y="9" width="42" height="3" rx="0.7" class="text-mid"/>
          </g>

          <g transform="translate(0 122)">
            <line x1="0" y1="0" x2="410" y2="0" class="border-faint" stroke-width="0.5"/>
            <rect x="10" y="9" width="4" height="4" rx="0.6" class="surface" stroke-width="0.4"/>
            <rect x="22" y="9" width="68" height="3" rx="0.7" class="text-strong" opacity="0.85"/>
            <rect x="116" y="9" width="58" height="3" rx="0.7" class="text-mid"/>
            <rect x="194" y="9" width="44" height="3" rx="0.7" class="text-mid"/>
            <rect x="272" y="6" width="48" height="11" rx="5.5" fill="rgba(16,185,129,0.18)"/>
            <circle cx="279" cy="11.5" r="1.6" fill="#10B981"/>
            <text x="297" y="13.4" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="4.5" font-weight="700" fill="#10B981">QUALIFIED</text>
            <rect x="356" y="9" width="38" height="3" rx="0.7" class="text-mid"/>
          </g>

          <g transform="translate(0 146)">
            <line x1="0" y1="0" x2="410" y2="0" class="border-faint" stroke-width="0.5"/>
            <rect x="10" y="9" width="4" height="4" rx="0.6" class="surface" stroke-width="0.4"/>
            <rect x="22" y="9" width="78" height="3" rx="0.7" class="text-strong" opacity="0.85"/>
            <rect x="116" y="9" width="62" height="3" rx="0.7" class="text-mid"/>
            <rect x="194" y="9" width="40" height="3" rx="0.7" class="text-mid"/>
            <rect x="272" y="6" width="48" height="11" rx="5.5" fill="rgba(239,68,68,0.18)"/>
            <circle cx="279" cy="11.5" r="1.6" fill="#EF4444"/>
            <text x="297" y="13.4" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="4.5" font-weight="700" fill="#EF4444">DROPPED</text>
            <rect x="356" y="9" width="34" height="3" rx="0.7" class="text-mid"/>
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>
