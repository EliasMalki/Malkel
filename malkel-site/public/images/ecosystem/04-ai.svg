<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380" role="img" aria-label="MalkelAI flow diagram showing inbound leads connecting through a glowing animated blue-to-purple AI core to four downstream outputs, with pulses traveling along the connections.">
  <style>
    .bg-card{fill:#0a0a0a}
    .node-bg{fill:#0d0d0d;stroke:rgba(255,255,255,0.10)}
    .text-strong{fill:#fff}
    .text-mid{fill:rgba(255,255,255,0.5)}
    .text-soft{fill:rgba(255,255,255,0.3)}
    .text-faint{fill:rgba(255,255,255,0.18)}
    .surface-faint{fill:rgba(255,255,255,0.04);stroke:rgba(255,255,255,0.08)}
    .pulse-stroke{stroke:rgba(255,255,255,0.06)}

    .light .bg-card{fill:#F5F5F7}
    .light .node-bg{fill:#fff;stroke:rgba(0,0,0,0.08)}
    .light .text-strong{fill:#0a0a0a}
    .light .text-mid{fill:rgba(0,0,0,0.55)}
    .light .text-soft{fill:rgba(0,0,0,0.35)}
    .light .text-faint{fill:rgba(0,0,0,0.18)}
    .light .surface-faint{fill:#FAFAFC;stroke:rgba(0,0,0,0.06)}
    .light .pulse-stroke{stroke:rgba(0,0,0,0.06)}
  </style>

  <defs>
    <!-- Live shifting gradient: blue ↔ purple -->
    <radialGradient id="malkel-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA">
        <animate attributeName="stop-color" values="#A78BFA;#60A5FA;#818CF8;#C4B5FD;#A78BFA" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="55%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#3B82F6;#6366F1;#8B5CF6;#7C3AED" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#5B21B6">
        <animate attributeName="stop-color" values="#5B21B6;#1D4ED8;#4338CA;#6D28D9;#5B21B6" dur="6s" repeatCount="indefinite"/>
      </stop>
    </radialGradient>

    <!-- Glow halo (also shifting) -->
    <radialGradient id="malkel-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.55">
        <animate attributeName="stop-color" values="#A78BFA;#60A5FA;#818CF8;#A78BFA" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.18">
        <animate attributeName="stop-color" values="#7C3AED;#3B82F6;#6366F1;#7C3AED" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#5B21B6" stop-opacity="0">
        <animate attributeName="stop-color" values="#5B21B6;#1D4ED8;#4338CA;#5B21B6" dur="6s" repeatCount="indefinite"/>
      </stop>
    </radialGradient>

    <!-- Connection gradients (also shifting) -->
    <linearGradient id="conn-in" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0">
        <animate attributeName="stop-color" values="#A78BFA;#60A5FA;#818CF8;#A78BFA" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.85">
        <animate attributeName="stop-color" values="#A78BFA;#60A5FA;#818CF8;#A78BFA" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="conn-out" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.85">
        <animate attributeName="stop-color" values="#A78BFA;#60A5FA;#818CF8;#A78BFA" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0">
        <animate attributeName="stop-color" values="#A78BFA;#60A5FA;#818CF8;#A78BFA" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="line-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="core-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="380" class="bg-card"/>

  <!-- Glow halo -->
  <circle cx="300" cy="190" r="100" fill="url(#malkel-glow)"/>

  <!-- Input node (left) -->
  <g transform="translate(40 158)">
    <rect width="120" height="64" rx="10" class="node-bg" stroke-width="0.7"/>
    <circle cx="18" cy="20" r="6.5" fill="rgba(167,139,250,0.18)"/>
    <path d="M 14 20 L 17 23 L 22 17" stroke="#A78BFA" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="32" y="17" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="6.5" font-weight="700" class="text-strong">Inbound lead</text>
    <text x="32" y="25" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="5" class="text-soft">Form / call / chat</text>

    <line x1="10" y1="36" x2="110" y2="36" class="pulse-stroke" stroke-width="0.5"/>

    <rect x="10" y="44" width="38" height="12" rx="6" class="surface-faint" stroke-width="0.5"/>
    <text x="29" y="52.5" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="4.5" class="text-mid">+ source</text>

    <text x="62" y="52.5" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="5" class="text-mid">3 active</text>
    <circle cx="102" cy="51" r="2" fill="#10B981"/>
    <circle cx="102" cy="51" r="2" fill="#10B981" opacity="0.4">
      <animate attributeName="r" from="2" to="5" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.4" to="0" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Incoming connection -->
  <g filter="url(#line-glow)">
    <path d="M 160 190 C 200 190, 220 190, 250 190" stroke="url(#conn-in)" stroke-width="1.8" fill="none"/>
  </g>
  <circle r="2.4" fill="#fff">
    <animateMotion path="M 160 190 C 200 190, 220 190, 250 190" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#A78BFA" opacity="0.6">
    <animateMotion path="M 160 190 C 200 190, 220 190, 250 190" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- MalkelAI Core -->
  <g transform="translate(300 190)">
    <!-- expanding rings -->
    <circle r="38" fill="none" stroke="#A78BFA" stroke-width="0.5" opacity="0.3"/>
    <circle r="38" fill="none" stroke="#A78BFA" stroke-width="0.5" opacity="0">
      <animate attributeName="r" from="38" to="62" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="38" fill="none" stroke="#A78BFA" stroke-width="0.5" opacity="0">
      <animate attributeName="r" from="38" to="62" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
    </circle>

    <!-- main orb -->
    <circle r="32" fill="url(#malkel-core)" filter="url(#core-blur)"/>
    <circle r="32" fill="url(#malkel-core)"/>

    <!-- inner geometry -->
    <g stroke="rgba(255,255,255,0.7)" stroke-width="0.8" fill="none">
      <circle r="20"/>
      <circle r="10"/>
      <line x1="-24" y1="0" x2="24" y2="0"/>
      <line x1="0" y1="-24" x2="0" y2="24"/>
      <line x1="-17" y1="-17" x2="17" y2="17"/>
      <line x1="-17" y1="17" x2="17" y2="-17"/>
    </g>
    <circle r="3.5" fill="#fff"/>
    <circle cx="20" cy="0" r="1.8" fill="#fff"/>
    <circle cx="-20" cy="0" r="1.8" fill="#fff"/>
    <circle cx="0" cy="20" r="1.8" fill="#fff"/>
    <circle cx="0" cy="-20" r="1.8" fill="#fff"/>

    <!-- label -->
    <text y="58" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="9" font-weight="700" class="text-strong">MalkelAI</text>
    <text y="68" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="5.5" class="text-mid">triage &amp; routing</text>
  </g>

  <!-- Outgoing connections -->
  <g filter="url(#line-glow)">
    <path d="M 332 174 C 380 148, 410 116, 442 94" stroke="url(#conn-out)" stroke-width="1.5" fill="none"/>
    <path d="M 335 182 C 380 170, 410 162, 442 154" stroke="url(#conn-out)" stroke-width="1.5" fill="none"/>
    <path d="M 335 198 C 380 208, 410 216, 442 224" stroke="url(#conn-out)" stroke-width="1.5" fill="none"/>
    <path d="M 332 206 C 380 232, 410 264, 442 286" stroke="url(#conn-out)" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Pulses -->
  <circle r="2" fill="#fff">
    <animateMotion path="M 332 174 C 380 148, 410 116, 442 94" dur="1.8s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#fff">
    <animateMotion path="M 335 182 C 380 170, 410 162, 442 154" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#fff">
    <animateMotion path="M 335 198 C 380 208, 410 216, 442 224" dur="1.8s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#fff">
    <animateMotion path="M 332 206 C 380 232, 410 264, 442 286" dur="1.8s" begin="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Output nodes -->
  <g transform="translate(442 78)">
    <rect width="120" height="34" rx="8" class="node-bg" stroke-width="0.7"/>
    <rect x="8" y="8" width="18" height="18" rx="4" fill="rgba(16,185,129,0.18)"/>
    <path d="M 13 16 L 17 19 L 22 14" stroke="#10B981" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="32" y="15" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="6.5" font-weight="700" class="text-strong">SMS reply</text>
    <text x="32" y="23" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="5" class="text-mid">&lt; 60 seconds</text>
  </g>

  <g transform="translate(442 138)">
    <rect width="120" height="34" rx="8" class="node-bg" stroke-width="0.7"/>
    <rect x="8" y="8" width="18" height="18" rx="4" fill="rgba(99,102,241,0.18)"/>
    <rect x="11" y="11.5" width="12" height="11" rx="1" fill="none" stroke="#6366F1" stroke-width="0.9"/>
    <line x1="11" y1="14.5" x2="23" y2="14.5" stroke="#6366F1" stroke-width="0.9"/>
    <rect x="13" y="16.5" width="2" height="2" fill="#6366F1"/>
    <rect x="16" y="16.5" width="2" height="2" fill="#6366F1"/>
    <rect x="13" y="19.5" width="2" height="2" fill="#6366F1"/>
    <text x="32" y="15" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="6.5" font-weight="700" class="text-strong">Calendar booked</text>
    <text x="32" y="23" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="5" class="text-mid">Auto-confirmed</text>
  </g>

  <g transform="translate(442 208)">
    <rect width="120" height="34" rx="8" class="node-bg" stroke-width="0.7"/>
    <rect x="8" y="8" width="18" height="18" rx="4" fill="rgba(245,158,11,0.18)"/>
    <rect x="11.5" y="12" width="11" height="2.4" rx="0.5" fill="#F59E0B"/>
    <rect x="11.5" y="15.5" width="9" height="2.4" rx="0.5" fill="#F59E0B" opacity="0.7"/>
    <rect x="11.5" y="19" width="11" height="2.4" rx="0.5" fill="#F59E0B" opacity="0.5"/>
    <text x="32" y="15" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="6.5" font-weight="700" class="text-strong">CRM enriched</text>
    <text x="32" y="23" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="5" class="text-mid">Data attached</text>
  </g>

  <g transform="translate(442 270)">
    <rect width="120" height="34" rx="8" class="node-bg" stroke-width="0.7"/>
    <rect x="8" y="8" width="18" height="18" rx="4" fill="rgba(236,72,153,0.18)"/>
    <path d="M 12 17 L 12 14 a 5 5 0 1 1 10 0 v 3 l 1.5 2 h -13 z" fill="#EC4899"/>
    <circle cx="17" cy="22" r="1.4" fill="#EC4899"/>
    <text x="32" y="15" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="6.5" font-weight="700" class="text-strong">Sales notified</text>
    <text x="32" y="23" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="5" class="text-mid">Routed by score</text>
  </g>

  <!-- Background depth dots -->
  <g class="text-faint">
    <circle cx="100" cy="60" r="0.8"/>
    <circle cx="180" cy="40" r="0.8"/>
    <circle cx="380" cy="50" r="0.8"/>
    <circle cx="500" cy="40" r="0.8"/>
    <circle cx="80" cy="320" r="0.8"/>
    <circle cx="200" cy="340" r="0.8"/>
    <circle cx="380" cy="330" r="0.8"/>
    <circle cx="510" cy="350" r="0.8"/>
  </g>
</svg>
